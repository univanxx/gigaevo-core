specs:
  fitness:
    description: "Main objective: (quality + (1 - leakage)) / 2. Higher is better."
    decimals: 3
    is_primary: true
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.01
    sentinel_value: -1000.0
  avg_quality:
    description: "Average quality of the remote LLM response score"
    decimals: 3
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.01
    sentinel_value: 0.0
  avg_leakage:
    description: "Average fraction of PII units leaked in sanitized queries"
    decimals: 3
    is_primary: false
    higher_is_better: false
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.01
    sentinel_value: 1.0
  is_valid:
    description: "Whether the program is valid (1 valid, 0 invalid)"
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 1.0
    sentinel_value: 0.0
