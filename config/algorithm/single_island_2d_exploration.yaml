# @package _global_

defaults:
  - _base

# Single-island MAP-Elites configuration

# Build behavior space from lists.

# For MedIQ we use 2D behavior:
#   - primary metric (fitness)
#   - average doctor token usage (tokens_count), to encourage shorter consultations

# Bounds for tokens_count (used only in this 2D config)
tokens_count_bounds:
  _target_: gigaevo.config.helpers.get_bounds
  metrics_context: ${metrics_context}
  key: tokens_count

behavior_space:
  _target_: gigaevo.config.helpers.build_behavior_space
  keys:
    - ${primary_key}       # fitness
    - tokens_count         # secondary behavior dimension
  bounds:
    - ${primary_bounds}
    - ${tokens_count_bounds}
  resolutions:
    - 100
    - 150
  binning_types:
    - ${binning_type}
    - linear
  dynamic: true
  expansion_buffer_ratio: 0.1

# Islands
islands:
  - _target_: gigaevo.evolution.strategies.map_elites.IslandConfig
    island_id: ${island_id}
    max_size: ${island_max_size}
    behavior_space: ${behavior_space}
    archive_selector:
      _target_: gigaevo.evolution.strategies.map_elites.SumArchiveSelector
      fitness_keys:
        - ${primary_key}
        # - tokens_count
      fitness_key_higher_is_better:
        - ${higher_is_better}
        # - false
      # fitness главная; tokens_count только тай-брейк при близком fitness
      # weights: [1.0, 0.001]
    elite_selector:
      _target_: gigaevo.evolution.strategies.map_elites.RandomEliteSelector
    archive_remover:
      _target_: gigaevo.evolution.strategies.map_elites.FitnessArchiveRemover
      fitness_key: ${primary_key}
      fitness_key_higher_is_better: ${higher_is_better}
    migrant_selector:
      _target_: gigaevo.evolution.strategies.map_elites.TopFitnessMigrantSelector
      fitness_key: ${primary_key}
      fitness_key_higher_is_better: ${higher_is_better}
    migration_rate: ${migration_rate}

# Evolution strategy
evolution_strategy:
  _target_: gigaevo.evolution.strategies.map_elites.MapElitesMultiIsland
  island_configs: ${islands}
  program_storage: ${ref:redis_storage}
  migration_interval: ${migration_interval}
  enable_migration: ${enable_migration}
  max_migrants_per_island: ${max_migrants_per_island}